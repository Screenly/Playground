<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BambooHR - Screenly Edge App</title>
    <script src="screenly.js?version=1"></script>
  </head>
  <body>
    <auto-scaler
      reference-width="1920"
      reference-height="1080"
      orientation="auto"
    >
      <div id="app">
        <header id="top-bar">
          <div id="logo-container">
            <brand-logo></brand-logo>
          </div>
          <div id="clock-container">
            <span id="clock-time"></span>
            <span id="clock-date"></span>
          </div>
        </header>

        <main id="content">
          <h1 id="date-heading"></h1>

          <div id="cards-grid">
            <section class="card" id="birthdays-card">
              <div class="card-header">
                <div class="card-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="white"
                  >
                    <path
                      d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h3a2 2 0 0 1 2 2v1a3 3 0 0 1 3 3v1h-1v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-5H3v-1a3 3 0 0 1 3-3V9a2 2 0 0 1 2-2h3V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2m-4 7v1h8V9H8m-2 4a1 1 0 0 0-1 1v1h14v-1a1 1 0 0 0-1-1H6m0 4v3h12v-3H6z"
                    />
                  </svg>
                </div>
                <span class="card-title">Birthdays</span>
              </div>
              <div class="card-body" id="birthdays-list">
                <p class="empty-state">No upcoming birthdays.</p>
              </div>
            </section>

            <section class="card" id="anniversaries-card">
              <div class="card-header">
                <div class="card-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="white"
                  >
                    <path
                      d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"
                    />
                  </svg>
                </div>
                <span class="card-title">Work Anniversaries</span>
              </div>
              <div class="card-body" id="anniversaries-list">
                <p class="empty-state">No upcoming anniversaries.</p>
              </div>
            </section>

            <section class="card" id="on-leave-card">
              <div class="card-header">
                <div class="card-icon">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    width="24"
                    height="24"
                    fill="white"
                  >
                    <path
                      d="M13.5 6.5C13.5 7.88 12.38 9 11 9S8.5 7.88 8.5 6.5 9.62 4 11 4s2.5 1.12 2.5 2.5M20 9l-1.62 1.62-2.12-2.12L18 6.76 16.24 5l-1.74 1.74-1.5-1.5C13.68 5.09 14 5 14 5c0-1.93-1.57-3.5-3.5-3.5S7 3.07 7 5c0 .72.22 1.38.59 1.93L3 11.5V14h2v7h8v-7h2v3h2v-3.18c1.17-.41 2-1.51 2-2.82 0-.62-.19-1.19-.5-1.67L20 9zM7 13H5v-1.5l5-5c.16.58.44 1.11.82 1.56L7 12.34V13zm4 6H9v-5h2v5zm0-7H9v-1.85l1-.72 1 .73V12z"
                    />
                  </svg>
                </div>
                <span class="card-title">On Leave Today</span>
              </div>
              <div class="card-body" id="on-leave-list">
                <p class="empty-state">No one on leave today.</p>
              </div>
            </section>
          </div>
        </main>
      </div>
    </auto-scaler>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
