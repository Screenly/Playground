<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BambooHR - Screenly Edge App</title>
    <script src="screenly.js?version=1"></script>
  </head>
  <body>
    <auto-scaler
      reference-width="1920"
      reference-height="1080"
      orientation="auto"
    >
      <div id="app">
        <header id="top-bar">
          <div id="logo-container">
            <brand-logo></brand-logo>
          </div>
          <div id="clock-container">
            <span id="clock-time"></span>
            <span id="clock-date"></span>
          </div>
        </header>

        <main id="content">
          <h1 id="date-heading"></h1>

          <div id="cards-grid">
            <section class="card" id="birthdays-card">
              <div class="card-header">
                <div class="card-icon">
                  <svg
                    width="40"
                    height="40"
                    viewBox="0 0 40 40"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <rect width="40" height="40" rx="7.27273" fill="#AC1FFF" />
                    <path
                      d="M12 29.9976C11.7167 29.9976 11.4793 29.9016 11.288 29.7096C11.0967 29.5176 11.0007 29.2802 11 28.9976V24.9976C11 24.4476 11.196 23.9769 11.588 23.5856C11.98 23.1942 12.4507 22.9982 13 22.9976H27C27.55 22.9976 28.021 23.1936 28.413 23.5856C28.805 23.9776 29.0007 24.4482 29 24.9976V28.9976C29 29.2809 28.904 29.5186 28.712 29.7106C28.52 29.9026 28.2827 29.9982 28 29.9976H12ZM13 20.9976V17.9976C13 17.4476 13.196 16.9769 13.588 16.5856C13.98 16.1942 14.4507 15.9982 15 15.9976H19V14.5476C18.7 14.3476 18.4583 14.1059 18.275 13.8226C18.0917 13.5392 18 13.1976 18 12.7976C18 12.5476 18.05 12.3016 18.15 12.0596C18.25 11.8176 18.4 11.5969 18.6 11.3976L20 9.99756L21.4 11.3976C21.6 11.5976 21.75 11.8182 21.85 12.0596C21.95 12.3009 22 12.5469 22 12.7976C22 13.1976 21.9083 13.5392 21.725 13.8226C21.5417 14.1059 21.3 14.3476 21 14.5476V15.9976H25C25.55 15.9976 26.021 16.1932 26.413 16.5846C26.805 16.9759 27.0007 17.4469 27 17.9976V20.9976H13Z"
                      fill="white"
                    />
                  </svg>
                </div>
                <span class="card-title">Birthdays</span>
              </div>
              <div class="card-body" id="birthdays-list">
                <p class="empty-state">No upcoming birthdays.</p>
              </div>
              <div class="card-summary" id="birthdays-summary"></div>
            </section>

            <section class="card" id="anniversaries-card">
              <div class="card-header">
                <div class="card-icon">
                  <svg
                    width="40"
                    height="40"
                    viewBox="0 0 40 40"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <rect width="40" height="40" rx="7.27273" fill="#AC1FFF" />
                    <g clip-path="url(#clip0_77_3460)">
                      <path
                        d="M22.4999 28.6668H20.8332V23.7839C23.6862 23.1218 25.752 20.4543 25.4749 17.3606L24.8103 9.93975C24.7795 9.59641 24.4957 9.3335 24.1557 9.3335H14.8441C14.5045 9.3335 14.2203 9.59641 14.1899 9.93975L13.5249 17.361C13.2478 20.4547 15.3137 23.1222 18.1666 23.7843V28.6668H16.4999C15.5795 28.6668 14.8332 29.4131 14.8332 30.3335C14.8332 30.5177 14.9824 30.6668 15.1666 30.6668H23.8332C24.0174 30.6668 24.1666 30.5177 24.1666 30.3335C24.1666 29.4131 23.4203 28.6668 22.4999 28.6668Z"
                        fill="white"
                      />
                    </g>
                    <defs>
                      <clipPath id="clip0_77_3460">
                        <rect
                          width="12"
                          height="21.3333"
                          fill="white"
                          transform="translate(13.5 9.33398)"
                        />
                      </clipPath>
                    </defs>
                  </svg>
                </div>
                <span class="card-title">Work Anniversaries</span>
              </div>
              <div class="card-body" id="anniversaries-list">
                <p class="empty-state">No upcoming anniversaries.</p>
              </div>
              <div class="card-summary" id="anniversaries-summary"></div>
            </section>

            <section class="card" id="on-leave-card">
              <div class="card-header">
                <div class="card-icon">
                  <svg
                    width="40"
                    height="40"
                    viewBox="0 0 60 60"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <rect width="60" height="60" rx="10.9091" fill="#AC1FFF" />
                    <path
                      d="M30.0208 16.665C22.6571 16.665 16.6875 22.6344 16.6875 29.9984C16.6875 37.3624 22.6571 43.3317 30.0208 43.3317C37.3846 43.3317 43.3542 37.3624 43.3542 29.9984C43.3542 22.6344 37.3846 16.665 30.0208 16.665ZM30.0208 21.9984C30.7572 21.9984 31.3542 22.5957 31.3542 23.3317V29.4144L34.9792 33.0397C35.4999 33.561 35.4999 34.4357 34.9792 34.957C34.4584 35.477 33.5832 35.477 33.0624 34.957L29.0624 30.957C28.8124 30.7064 28.6875 30.3517 28.6875 29.9984V23.3317C28.6875 22.5957 29.2844 21.9984 30.0208 21.9984Z"
                      fill="white"
                    />
                  </svg>
                </div>
                <span class="card-title">On Leave Today</span>
              </div>
              <div class="card-body" id="on-leave-list">
                <p class="empty-state">No one on leave today.</p>
              </div>
              <div class="card-summary" id="on-leave-summary"></div>
            </section>
          </div>
        </main>
      </div>
    </auto-scaler>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
