<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peripheral Integration POC - Screenly Edge App</title>
    <script src="screenly.js?version=1"></script>
  </head>
  <body>
    <auto-scaler
      reference-width="1920"
      reference-height="1080"
      orientation="auto"
    >
      <div id="app">
        <app-header class="header" show-date></app-header>
        <main class="content">
          <h1 class="title">Peripheral Sensors</h1>
          <div id="sensor-grid">
            <div class="sensor-card" id="card-ambient_temperature">
              <span class="sensor-label">Temperature</span>
              <span class="sensor-value" id="val-ambient_temperature">—</span>
              <span class="sensor-unit" id="unit-ambient_temperature"></span>
              <span class="sensor-timestamp" id="ts-ambient_temperature"></span>
            </div>
            <div class="sensor-card" id="card-secure_card_id">
              <span class="sensor-label">Card ID</span>
              <span class="sensor-value" id="val-secure_card_id">—</span>
              <span class="sensor-timestamp" id="ts-secure_card_id"></span>
            </div>
          </div>
        </main>
      </div>
    </auto-scaler>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
